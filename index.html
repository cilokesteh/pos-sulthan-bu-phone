<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E61E25">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="icons/favicon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="POS Sulthan">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js?v=8').catch(()=>{}));}</script>
    <title>POS</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="min-h-screen">
        <!-- Header -->
        <div class="bg-zinc-900 border-b border-zinc-800">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-store text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-2xl" id="store-name">Store</h1>
                        <p class="text-xs text-zinc-500">Point of Sale</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-4">
                    <a href="./reports" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-chart-bar"></i>
                        <span>Laporan</span>
                    </a>
                    <div class="px-4 py-1.5 bg-zinc-800 rounded-full text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-user text-emerald-400"></i>
                        <span id="admin-name">Admin</span>
                    </div>
                    <button onclick="logout()" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-xl text-sm flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                    <span class="text-[10px] text-zinc-600 select-none">v8</span>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Total Produk</div>
                    <div class="text-3xl font-bold mt-1" id="total-products">0</div>
                </div>
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Transaksi Hari Ini</div>
                    <div class="text-3xl font-bold mt-1" id="today-transactions">0</div>
                </div>
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Pendapatan Hari Ini</div>
                    <div class="text-3xl font-bold mt-1 text-emerald-400" id="today-revenue">Rp 0</div>
                </div>
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Stok Menipis (&lt; 5)</div>
                    <div class="text-3xl font-bold mt-1 text-amber-400" id="low-stock">0</div>
                    <div id="low-stock-list" class="mt-2 space-y-1 text-xs text-zinc-400 max-h-32 overflow-auto"></div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- Product List -->
                <div class="lg:col-span-5 bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-lg">Daftar Produk</h2>
                        <button onclick="showProductModal()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm flex items-center gap-x-2 transition-colors">
                            <i class="fa-solid fa-plus"></i>
                            <span>Tambah</span>
                        </button>
                    </div>

                    <div class="mb-3">
                        <input type="text" id="search-product" placeholder="Cari produk..." 
                               class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500"
                               onkeyup="filterProducts()">
                    </div>

                    <div class="flex gap-2 mb-4 overflow-x-auto">
                        <button onclick="setCategoryFilter('all')" class="category-tab px-4 py-2 bg-emerald-600 rounded-2xl text-xs" data-category="all">Semua</button>
                        <button onclick="setCategoryFilter('Handphone')" class="category-tab px-4 py-2 bg-zinc-800 rounded-2xl text-xs" data-category="Handphone">Handphone</button>
                        <button onclick="setCategoryFilter('Aksesoris')" class="category-tab px-4 py-2 bg-zinc-800 rounded-2xl text-xs" data-category="Aksesoris">Aksesoris</button>
                        <button onclick="setCategoryFilter('Lainnya')" class="category-tab px-4 py-2 bg-zinc-800 rounded-2xl text-xs" data-category="Lainnya">Lainnya</button>
                    </div>

                    <div id="product-list" class="space-y-2 max-h-[320px] overflow-auto pr-2">
                        <!-- Products populated by JS -->
                    </div>
                </div>

                <!-- Cart -->
                <div class="lg:col-span-7 bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-lg">Keranjang</h2>
                        <button onclick="clearCart()" class="text-sm text-red-400 hover:text-red-500">Kosongkan</button>
                    </div>

                    <div id="cart-list" class="space-y-2 min-h-[200px] max-h-[280px] overflow-auto mb-4">
                        <!-- Cart items -->
                    </div>

                    <div class="border-t border-zinc-700 pt-4">
                        <div class="flex justify-between text-lg font-bold mb-4">
                            <span>Total</span>
                            <span id="cart-total">Rp 0</span>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="showPaymentModal()" class="py-3.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">
                                <i class="fa-solid fa-credit-card mr-2"></i>Bayar
                            </button>
                            <button onclick="clearCart()" class="py-3.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-semibold">
                                Batal
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md border border-zinc-800 p-6 mx-4">
            <h3 class="font-semibold text-xl mb-4" id="modal-title">Tambah Produk</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-zinc-400">Nama Produk</label>
                    <input type="text" id="product-name" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-zinc-400">Harga Jual (Rp)</label>
                        <input type="number" id="product-price" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-zinc-400">Harga Beli (Modal) (Rp)</label>
                        <input type="number" id="product-cost" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-zinc-400">Stok</label>
                        <input type="number" id="product-stock" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-zinc-400">Kategori</label>
                        <select id="product-category" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                        <option value="Handphone">Handphone</option>
                        <option value="Aksesoris">Aksesoris</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="hideProductModal()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Batal</button>
                <button onclick="saveProduct()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="payment-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md border border-zinc-800 p-6 mx-4">
            <h3 class="font-semibold text-xl mb-4">Pembayaran</h3>
            
            <div class="text-center mb-6">
                <div class="text-zinc-400">Total Belanja</div>
                <div id="payment-total" class="text-4xl font-bold text-emerald-400 mt-1">Rp 0</div>
            </div>

            <!-- Customer & Kasir -->
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="text-sm text-zinc-400">Nama Customer</label>
                    <input type="text" id="customer-name" placeholder="Walk-in" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-sm" onkeydown="if(event.key==='Enter')document.getElementById('customer-wa').focus()">
                </div>
                <div>
                    <label class="text-sm text-zinc-400">Kasir</label>
                    <input type="text" id="kasir-name" readonly class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-sm text-zinc-400">
                </div>
            </div>

            <div class="mb-4">
                <label class="text-sm text-zinc-400">No. WhatsApp Customer (opsional)</label>
                <input type="tel" id="customer-wa" placeholder="08xx-xxxx-xxxx" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-sm" onkeydown="if(event.key==='Enter')document.getElementById('cash-amount').focus()">
            </div>

            <div class="mb-4">
                <label class="text-sm text-zinc-400">Metode Pembayaran</label>
                <div class="grid grid-cols-4 gap-2 mt-2">
                    <button onclick="selectPaymentMethod('cash')" id="method-cash" class="py-2 rounded-xl border border-zinc-700 bg-emerald-900/30 border-emerald-500 text-sm">Cash</button>
                    <button onclick="selectPaymentMethod('qris')" id="method-qris" class="py-2 rounded-xl border border-zinc-700 bg-zinc-800 hover:border-emerald-500 text-sm">QRIS</button>
                    <button onclick="selectPaymentMethod('transfer')" id="method-transfer" class="py-2 rounded-xl border border-zinc-700 bg-zinc-800 hover:border-emerald-500 text-sm">Transfer</button>
                    <button onclick="selectPaymentMethod('split')" id="method-split" class="py-2 rounded-xl border border-zinc-700 bg-zinc-800 hover:border-emerald-500 text-sm">Split</button>
                </div>
            </div>

            <div id="cash-section">
                <label class="text-sm text-zinc-400">Uang Tunai</label>
                <input type="number" id="cash-amount" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1 text-2xl text-center" oninput="calculateChange()">
                
                <div class="flex justify-between mt-4 text-lg">
                    <span class="text-zinc-400">Kembalian</span>
                    <span id="change-amount" class="font-bold text-emerald-400">Rp 0</span>
                </div>
            </div>

            <!-- Split Payment Section -->
            <div id="split-section" class="hidden">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="text-sm text-zinc-400">Cash</label>
                        <input type="number" id="split-cash" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-lg text-center" oninput="calcSplit()">
                    </div>
                    <div>
                        <label class="text-sm text-zinc-400">Kartu</label>
                        <input type="number" id="split-card" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-lg text-center" oninput="calcSplit()">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-2">
                    <div>
                        <label class="text-sm text-zinc-400">Tipe Kartu</label>
                        <select id="card-type" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-sm">
                            <option value="debit">Debit</option>
                            <option value="credit">Kartu Kredit</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-sm text-zinc-400">No. Kartu</label>
                        <input type="text" id="card-number" placeholder="1234 **** **** 5678" maxlength="19" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-3 py-2 mt-1 text-sm">
                    </div>
                </div>
                <div class="flex justify-between mt-3 text-sm border-t border-zinc-700 pt-2">
                    <span class="text-zinc-400">Sisa</span>
                    <span id="split-remaining" class="font-bold text-emerald-400">Rp 0</span>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="hidePaymentModal()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Batal</button>
                <button onclick="confirmPayment()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">Konfirmasi</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-sm border border-zinc-800 p-6 mx-4 text-center">
            <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-check text-emerald-400 text-3xl"></i>
            </div>
            <h3 class="font-semibold text-xl mb-2">Konfirmasi Pembayaran</h3>
            <p class="text-zinc-400 mb-1">Total: <span id="confirm-total" class="text-white font-bold">Rp 0</span></p>
            <p class="text-zinc-400 mb-1">Metode: <span id="confirm-method" class="text-white font-bold">Cash</span></p>
            <p id="confirm-change-text" class="text-zinc-400 mb-6">Kembalian: <span id="confirm-change" class="text-emerald-400 font-bold">Rp 0</span></p>
            
            <div class="flex gap-3">
                <button onclick="hideConfirmModal()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Batal</button>
                <button onclick="finishPayment()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">Selesai</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receipt-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div id="receipt-content" class="bg-white text-black mx-4 font-mono text-[13px] leading-tight" style="max-width:320px;padding:8px;">
            <!-- Receipt content injected by JS -->
        </div>
        <div class="absolute bottom-8 flex gap-3">
            <button id="send-wa-btn" onclick="sendReceiptToWA()" class="hidden px-4 py-2 bg-green-500 text-white rounded-2xl text-sm"><i class="fa-brands fa-whatsapp mr-1"></i>Kirim WA</button>
            <button onclick="printReceipt()" class="px-4 py-2 bg-emerald-600 text-white rounded-2xl text-sm"><i class="fa-solid fa-print mr-1"></i>Print</button>
            <button onclick="downloadPdf()" class="px-4 py-2 bg-zinc-700 text-white rounded-2xl text-sm"><i class="fa-solid fa-download mr-1"></i>PDF</button>
            <button onclick="hideReceiptModal()" class="px-4 py-2 bg-zinc-800 text-white rounded-2xl text-sm">Tutup</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Apply theme color & store name from CONFIG
        (function() {
            const theme = THEMES[CONFIG.theme] || THEMES.emerald;
            const hex = theme.hex;
            const dark = theme.bg;
            const gold = theme.gold || hex; // aksen emas (fallback ke primary)
            // RGB triplet for opacity variants (e.g. bg-emerald-500/20)
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            const rgb = `${r}, ${g}, ${b}`;

            document.documentElement.style.setProperty('--theme-primary', hex);
            document.documentElement.style.setProperty('--theme-bg', dark);
            document.documentElement.style.setProperty('--theme-gold', gold);

            // Inject overrides so Tailwind emerald utilities follow CONFIG.theme
            const css = `
                .bg-emerald-500 { background-color: ${hex} !important; }
                .bg-emerald-600 { background-color: ${hex} !important; }
                .hover\\:bg-emerald-700:hover { background-color: ${dark} !important; }
                .text-emerald-400 { color: ${gold} !important; }
                .border-emerald-500 { border-color: ${hex} !important; }
                .hover\\:border-emerald-500:hover { border-color: ${hex} !important; }
                .focus\\:border-emerald-500:focus { border-color: ${hex} !important; }
                .bg-emerald-500\\/20 { background-color: rgba(${rgb}, 0.2) !important; }
                .bg-emerald-900\\/30 { background-color: rgba(${rgb}, 0.3) !important; }
                /* Aksen emas royal — match website Sulthan */
                .text-emerald-400 { color: ${gold} !important; }
                h1#store-name { background: linear-gradient(135deg, ${gold}, #FFA500); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
                .bg-emerald-500, .bg-emerald-600 { box-shadow: 0 2px 12px rgba(${rgb}, 0.25); }
                ::selection { background: ${hex}; color: #fff; }
            `;
            const styleEl = document.createElement('style');
            styleEl.id = 'theme-overrides';
            styleEl.textContent = css;
            document.head.appendChild(styleEl);

            const sn = document.getElementById('store-name');
            if (sn) sn.textContent = CONFIG.storeName;
            document.title = `POS — ${CONFIG.storeName}`;
        })();

        const firebaseConfig = CONFIG.firebase;

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let products = [];
        let cart = [];
        let currentFilter = 'all';
        let editingProductId = null;
        let selectedPaymentMethod = 'cash';
        let todayStats = { transactions: 0, revenue: 0 };

        // Auth check
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = './login';
            } else {
                currentUser = user;
                document.getElementById('admin-name').textContent = user.email.split('@')[0];
                loadProducts();
                loadTodayStats();
            }
        });

        function logout() {
            auth.signOut().then(() => window.location.href = './login');
        }

        // Load products from Firestore
        function loadProducts() {
            db.collection('demo-products').onSnapshot(snapshot => {
                products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                renderProducts();
                updateStats();
            });
        }

        function renderProducts(filteredProducts = null) {
            const container = document.getElementById('product-list');
            container.innerHTML = '';

            let list = filteredProducts || products;
            
            if (currentFilter !== 'all') {
                list = list.filter(p => p.category === currentFilter);
            }

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center text-zinc-500 py-8">Tidak ada produk</div>`;
                return;
            }

            list.forEach(product => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-3 bg-zinc-950 rounded-2xl border border-zinc-800 hover:border-emerald-500';
                div.innerHTML = `
                    <div class="flex-1 cursor-pointer" onclick="addToCart('${product.id}')">
                        <div class="font-medium">${product.name}</div>
                        <div class="text-xs text-zinc-400">${product.category} • Stok: <span class="${product.stock >= 5 ? 'text-emerald-400' : 'text-red-400'}">${product.stock}</span></div>
                        <div class="font-semibold text-emerald-400">Rp ${product.price.toLocaleString('id-ID')}</div>
                    </div>
                    <div class="flex gap-2 ml-2">
                        <button onclick="event.stopPropagation(); showProductModal(products.find(p=>p.id==='${product.id}'))" 
                                class="w-8 h-8 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-xs flex items-center justify-center">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteProduct('${product.id}')" 
                                class="w-8 h-8 bg-red-600 hover:bg-red-700 rounded-lg text-xs flex items-center justify-center">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                        <button onclick="event.stopPropagation(); addToCart('${product.id}')" 
                                class="w-8 h-8 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-xs flex items-center justify-center">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function filterProducts() {
            const q = document.getElementById('search-product').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function setCategoryFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-tab').forEach(el => {
                el.classList.toggle('bg-emerald-600', el.dataset.category === cat);
                el.classList.toggle('bg-zinc-800', el.dataset.category !== cat);
            });
            renderProducts();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.stock <= 0) return alert('Stok habis');

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                if (existing.qty < product.stock) existing.qty++;
            } else {
                cart.push({ ...product, qty: 1, imei: '' });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-list');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center text-zinc-500 py-8">Keranjang kosong</div>`;
                document.getElementById('cart-total').textContent = 'Rp 0';
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                const div = document.createElement('div');
                div.className = 'p-3 bg-zinc-950 rounded-2xl';
                const imeiField = item.category === 'Handphone' ? `
                    <div class="mt-2 flex gap-2">
                        <input type="text" value="${item.imei || ''}" placeholder="IMEI (opsional)" 
                               class="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-1.5 text-xs" 
                               oninput="updateIMEI(${index}, this.value)" 
                               onkeydown="if(event.key==='Enter')event.preventDefault()">
                    </div>
                ` : '';
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-medium">${item.name}</div>
                            <div class="text-xs text-zinc-400">Rp ${item.price.toLocaleString('id-ID')} × ${item.qty}</div>
                        </div>
                        <div class="flex items-center gap-x-3">
                            <div class="font-semibold">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</div>
                            <div class="flex gap-1">
                                <button onclick="changeQty(${index}, -1)" class="w-6 h-6 bg-zinc-800 rounded">-</button>
                                <button onclick="changeQty(${index}, 1)" class="w-6 h-6 bg-zinc-800 rounded">+</button>
                                <button onclick="removeFromCart(${index})" class="w-6 h-6 text-red-400"><i class="fa-solid fa-times"></i></button>
                            </div>
                        </div>
                    </div>
                    ${imeiField}
                `;
                container.appendChild(div);
            });
            document.getElementById('cart-total').textContent = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty < 1) cart[index].qty = 1;
            renderCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function updateIMEI(index, value) {
            cart[index].imei = value;
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        function showProductModal(product = null) {
            editingProductId = product ? product.id : null;
            document.getElementById('modal-title').textContent = product ? 'Edit Produk' : 'Tambah Produk';
            
            if (product) {
                document.getElementById('product-name').value = product.name;
                document.getElementById('product-price').value = product.price;
                document.getElementById('product-cost').value = product.costPrice || 0;
                document.getElementById('product-stock').value = product.stock;
                document.getElementById('product-category').value = product.category;
            } else {
                document.getElementById('product-name').value = '';
                document.getElementById('product-price').value = '';
                document.getElementById('product-cost').value = '';
                document.getElementById('product-stock').value = '';
                document.getElementById('product-category').value = 'Handphone';
            }
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function hideProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        function saveProduct() {
            const name = document.getElementById('product-name').value.trim();
            const price = parseInt(document.getElementById('product-price').value);
            const costPrice = parseInt(document.getElementById('product-cost').value) || 0;
            const stock = parseInt(document.getElementById('product-stock').value);
            const category = document.getElementById('product-category').value;

            if (!name || isNaN(price) || isNaN(stock)) return alert('Lengkapi data');

            const data = { name, price, costPrice, stock, category };

            if (editingProductId) {
                db.collection('demo-products').doc(editingProductId).update(data);
            } else {
                db.collection('demo-products').add(data);
            }
            hideProductModal();
        }

        async function deleteProduct(id) {
            const product = products.find(p => p.id === id);
            const name = product ? product.name : 'produk ini';
            if (!confirm(`Hapus produk "${name}"?\nTindakan ini tidak dapat dibatalkan.`)) return;
            try {
                await db.collection('demo-products').doc(id).delete();
            } catch (err) {
                alert('Gagal menghapus produk: ' + err.message);
            }
        }

        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;
            document.querySelectorAll('[id^="method-"]').forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-900/30');
            });
            const active = document.getElementById(`method-${method}`);
            active.classList.add('border-emerald-500', 'bg-emerald-900/30');

            const cashSection = document.getElementById('cash-section');
            const splitSection = document.getElementById('split-section');
            cashSection.classList.add('hidden');
            splitSection.classList.add('hidden');
            
            if (method === 'cash') {
                cashSection.classList.remove('hidden');
            } else if (method === 'split') {
                splitSection.classList.remove('hidden');
                calcSplit();
            }
        }

        function showPaymentModal() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            document.getElementById('payment-total').textContent = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('cash-amount').value = '';
            document.getElementById('change-amount').textContent = 'Rp 0';
            document.getElementById('customer-name').value = '';
            document.getElementById('customer-wa').value = '';
            document.getElementById('kasir-name').value = currentUser ? currentUser.email : 'admin';
            // Reset split fields
            document.getElementById('split-cash').value = '';
            document.getElementById('split-card').value = '';
            document.getElementById('card-number').value = '';
            document.getElementById('card-type').value = 'debit';
            document.getElementById('split-remaining').textContent = 'Rp 0';
            document.getElementById('payment-modal').classList.remove('hidden');
            selectPaymentMethod('cash');
            document.getElementById('customer-name').focus();
        }

        function hidePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function calculateChange() {
            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            const cash = parseInt(document.getElementById('cash-amount').value) || 0;
            const change = Math.max(0, cash - total);
            
            const changeEl = document.getElementById('change-amount');
            if (cash >= total) {
                changeEl.className = 'font-bold text-emerald-400';
                changeEl.textContent = `Rp ${change.toLocaleString('id-ID')}`;
            } else {
                const kurang = total - cash;
                changeEl.className = 'font-bold text-red-400';
                changeEl.textContent = `Kurang Rp ${kurang.toLocaleString('id-ID')}`;
            }
        }

        function confirmPayment() {
            if (cart.length === 0) return;

            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            
            if (selectedPaymentMethod === 'cash') {
                const cash = parseInt(document.getElementById('cash-amount').value) || 0;
                if (cash < total) {
                    const kurang = total - cash;
                    alert(`⚠️ Uang kurang!\n\nTotal: Rp ${total.toLocaleString('id-ID')}\nBayar: Rp ${cash.toLocaleString('id-ID')}\nKurang: Rp ${kurang.toLocaleString('id-ID')}\n\nSilakan tambah nominal.`);
                    return;
                }
            }

            // Show confirm modal
            document.getElementById('confirm-total').textContent = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('confirm-method').textContent = 
                selectedPaymentMethod === 'cash' ? 'Cash' : 
                selectedPaymentMethod === 'qris' ? 'QRIS' : 'Transfer';
            
            const changeText = document.getElementById('confirm-change-text');
            if (selectedPaymentMethod === 'cash') {
                const cash = parseInt(document.getElementById('cash-amount').value) || 0;
                const change = cash - total;
                changeText.classList.remove('hidden');
                document.getElementById('confirm-change').textContent = `Rp ${change.toLocaleString('id-ID')}`;
            } else {
                changeText.classList.add('hidden');
            }

            hidePaymentModal();
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function hideConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        async function finishPayment() {
            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            let cash = 0;
            let change = 0;

            if (selectedPaymentMethod === 'cash') {
                cash = parseInt(document.getElementById('cash-amount').value) || 0;
                change = cash - total;
            }

            try {
                // Count this year's transactions for receipt seq (resets Jan 1)
                const yearStart = new Date(new Date().getFullYear(), 0, 1);
                const yearEnd = new Date(new Date().getFullYear() + 1, 0, 1);
                
                const yearSnap = await db.collection('demo-transactions')
                    .where('createdAt', '>=', yearStart.getTime())
                    .where('createdAt', '<', yearEnd.getTime())
                    .get();
                const receiptSeq = yearSnap.size + 1;

                const now = firebase.firestore.FieldValue.serverTimestamp();
                
                const transaction = {
                    items: cart.map(item => ({
                        name: item.name,
                        price: item.price,
                        qty: item.qty,
                        subtotal: item.price * item.qty,
                        costPrice: item.costPrice || 0,
                        imei: item.imei || '',
                        category: item.category || ''
                    })),
                    total,
                    cash,
                    change,
                    method: selectedPaymentMethod,
                    customerName: document.getElementById('customer-name').value || 'Walk-in',
                    customerWA: document.getElementById('customer-wa').value || '',
                    kasirName: document.getElementById('kasir-name').value || currentUser?.email || 'admin',
                    timestamp: now,
                    receiptSeq,
                    createdAt: Date.now(),
                    createdBy: currentUser.email
                };

                await db.collection('demo-transactions').add(transaction);

                // Save / update customer in customer database
                const waInput = document.getElementById('customer-wa').value.trim();
                const nameInput = document.getElementById('customer-name').value.trim();
                if (waInput) {
                    const custSnap = await db.collection('demo-customers').where('wa', '==', waInput).limit(1).get();
                    if (custSnap.empty) {
                        await db.collection('demo-customers').add({ name: nameInput || 'Walk-in', wa: waInput, totalSpent: total, visitCount: 1, createdAt: Date.now() });
                    } else {
                        const custDoc = custSnap.docs[0];
                        await custDoc.ref.update({ name: nameInput || custDoc.data().name, totalSpent: firebase.firestore.FieldValue.increment(total), visitCount: firebase.firestore.FieldValue.increment(1), lastVisit: Date.now() });
                    }
                }

                // Update stock
                for (const item of cart) {
                    await db.collection('demo-products').doc(item.id).update({
                        stock: firebase.firestore.FieldValue.increment(-item.qty)
                    });
                }

                hideConfirmModal();
                showReceipt(transaction);
                cart = [];
                renderCart();
            } catch (err) {
                alert('Gagal menyimpan transaksi: ' + err.message);
            }
        }

        function showReceipt(transaction) {
            const modal = document.getElementById('receipt-modal');
            const content = document.getElementById('receipt-content');
            content.style.width = `${CONFIG.receipt.width}mm`;
            const methodLabel = transaction.method === 'cash' ? 'Cash' : 
                              transaction.method === 'qris' ? 'QRIS' : 'Transfer';
            
            // Generate receipt number: POS-DDMMYY-0000001
            let ts;
            if (transaction.createdAt && typeof transaction.createdAt === 'number') {
                ts = new Date(transaction.createdAt);
            } else if (transaction.timestamp && transaction.timestamp?.toDate) {
                ts = new Date(transaction.timestamp.toDate());
            } else {
                ts = new Date();
            }
            if (isNaN(ts.getTime())) ts = new Date();
            
            const dd = String(ts.getDate()).padStart(2, '0');
            const MM = String(ts.getMonth() + 1).padStart(2, '0');
            const yy = String(ts.getFullYear()).slice(-2);
            const seq = String(transaction.receiptSeq || 1).padStart(6, '0');
            const receiptNo = `POS-${dd}${MM}${yy}-${seq}`;
            
            const timeStr = ts.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const dateStr = `${dd}/${MM}/${yy}`;
            
            // Build receipt HTML with thermal-precise formatting
            let html = '';
            
            // Wrap everything in a centered container
            html += `<div style="width:100%;text-align:center;max-width:${CONFIG.receipt.width}mm;margin:0 auto;">`;

            // Header
            html += `<div style="margin-bottom:6px;">`;
            html += `<div style="font-size:16px;font-weight:bold;letter-spacing:1px;">${CONFIG.storeName.toUpperCase()}</div>`;
            html += `<div style="font-size:10px;font-style:italic;margin:2px 0;">"${CONFIG.storeJargon}"</div>`;
            html += `<div style="font-size:10px;">${dateStr} ${timeStr}</div>`;
            html += `<div style="font-size:10px;margin-top:2px;border:1px solid #ccc;display:inline-block;padding:0 6px;">${receiptNo}</div>`;
            html += `</div>`;
            
            html += `<div style="border-top:1px dashed #000;margin:6px 0;"></div>`;
            
            // Customer & Kasir
            const custName = transaction.customerName || 'Walk-in';
            const kasirName = transaction.kasirName || transaction.createdBy || 'admin';
            html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:2px;">`;
            html += `<span>Customer</span>`;
            html += `<span>${custName}</span>`;
            html += `</div>`;
            html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:1px;">`;
            html += `<span>Kasir</span>`;
            html += `<span>${kasirName}</span>`;
            html += `</div>`;
            
            // Item header
            html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;">`;
            html += `<span style="font-weight:bold;">Item</span>`;
            html += `<span style="font-weight:bold;">Jml x Hrg</span>`;
            html += `</div>`;
            
            transaction.items.forEach(item => {
                html += `<div style="display:flex;justify-content:space-between;font-size:11px;">`;
                html += `<span>${item.name} x${item.qty}</span>`;
                html += `<span>${item.subtotal.toLocaleString('id-ID')}</span>`;
                html += `</div>`;
                if (item.imei) {
                    html += `<div style="font-size:9px;color:#666;padding-left:8px;">IMEI: ${item.imei}</div>`;
                }
            });
            
            // Totals
            html += `<div style="border-top:1px dashed #000;margin:6px 0;"></div>`;
            html += `<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:bold;">`;
            html += `<span>TOTAL</span>`;
            html += `<span>${transaction.total.toLocaleString('id-ID')}</span>`;
            html += `</div>`;
            html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:2px;">`;
            html += `<span>Metode</span>`;
            html += `<span>${methodLabel}</span>`;
            html += `</div>`;
            
            if (transaction.method === 'cash') {
                html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:2px;">`;
                html += `<span>Tunai</span>`;
                html += `<span>${transaction.cash.toLocaleString('id-ID')}</span>`;
                html += `</div>`;
                html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:1px;">`;
                html += `<span>Kembali</span>`;
                html += `<span>${transaction.change.toLocaleString('id-ID')}</span>`;
                html += `</div>`;
            }
            
            // Footer
            html += `<div style="border-top:1px dashed #000;margin:8px 0;"></div>`;
            html += `<div style="font-size:11px;margin-top:4px;">Terima Kasih</div>`;
            html += `<div style="font-size:9px;color:#666;margin-top:6px;line-height:1.6;">`;
            html += `${CONFIG.storeAddress}<br>`;
            html += `${CONFIG.storeHours}<br>`;
            html += `WA: ${CONFIG.storeWA}<br>`;
            html += `IG: ${CONFIG.storeIG}<br>`;
            html += `${CONFIG.storeWebsite}`;
            html += `</div>`;
            
            html += `</div>`; // close centered wrapper
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
            
            window._lastReceiptNo = receiptNo;
            window._lastReceiptData = transaction;
            const waBtn = document.getElementById('send-wa-btn');
            if (transaction.customerWA) { waBtn.classList.remove('hidden'); } else { waBtn.classList.add('hidden'); }
        }

        function hideReceiptModal() {
            document.getElementById('receipt-modal').classList.add('hidden');
        }

        function printReceipt() {
            const element = document.getElementById('receipt-content');
            const receiptNo = window._lastReceiptNo || 'receipt';
            const w = CONFIG.receipt.width || 80;
            
            const printWin = window.open('', '_blank', 'width=400,height=600');
            printWin.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Print ${receiptNo}</title>
                    <style>
                        @page { margin: 0; size: ${w}mm auto; }
                        body { margin: 0; padding: 0; font-family: 'Courier New', monospace; color: #000; display:flex;justify-content:center; }
                        #pwrap { width:${w}mm; padding:4mm 2mm; box-sizing:border-box; }
                        * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                    </style>
                </head>
                <body><div id="pwrap">${element.innerHTML}</div></body>
                </html>
            `);
            printWin.document.close();
            printWin.focus();
            setTimeout(() => {
                printWin.print();
                printWin.close();
            }, 500);
        }

        function downloadPdf() {
            const element = document.getElementById('receipt-content');
            const w = CONFIG.receipt.width || 80; // mm

            // Capture at 2x so text is crisp on any device.
            // Then compute PDF height from the actual rendered aspect ratio
            // so the content is never stretched or clipped.
            html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                scrollX: 0,
                scrollY: 0,
                windowWidth: document.documentElement.offsetWidth
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.98);
                // maintain exact aspect ratio: PDF height = (px ratio) × page width
                const pdfHeight = (canvas.height / canvas.width) * w;

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    unit: 'mm',
                    format: [w, pdfHeight],
                    orientation: 'portrait'
                });
                pdf.addImage(imgData, 'JPEG', 0, 0, w, pdfHeight);
                pdf.save(`${window._lastReceiptNo || 'receipt'}.pdf`);
            });
        }

        async function sendReceiptToWA() {
            const t = window._lastReceiptData;
            if (!t) return alert('Data struk tidak tersedia.');

            // Format WA number: strip non-digits, convert 08xx → 628xx
            let wa = (t.customerWA || '').replace(/\D/g, '');
            if (wa.startsWith('0')) wa = '62' + wa.slice(1);
            else if (wa.startsWith('8')) wa = '62' + wa;
            else if (!wa.startsWith('62')) wa = '62' + wa;

            // The receipt modal is open/visible here, so capture receipt-content
            // directly (an off-screen clone produced a blank PDF).
            const element = document.getElementById('receipt-content');
            const w = CONFIG.receipt.width || 80;

            // Generate PDF with auto aspect ratio
            html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                scrollX: 0,
                scrollY: 0,
                windowWidth: document.documentElement.offsetWidth
            }).then(async (canvas) => {
                const imgData = canvas.toDataURL('image/jpeg', 0.98);
                const pdfHeight = (canvas.height / canvas.width) * w;
                const { jsPDF } = window.jspdf;
                const pdfDoc = new jsPDF({ unit: 'mm', format: [w, pdfHeight], orientation: 'portrait' });
                pdfDoc.addImage(imgData, 'JPEG', 0, 0, w, pdfHeight);
                const pdfBlob = pdfDoc.output('blob');
                const pdfFile = new File([pdfBlob], `${window._lastReceiptNo || 'receipt'}.pdf`, { type: 'application/pdf' });

                // Coba kirim via Web Share API (support file sharing di mobile)
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
                    await navigator.share({
                        files: [pdfFile],
                        title: `Struk ${window._lastReceiptNo || 'receipt'}`,
                    });
                } else {
                    // Fallback: kirim via wa.me text
                    const ts = (t.createdAt && typeof t.createdAt === 'number') ? new Date(t.createdAt) :
                               (t.timestamp && t.timestamp?.toDate) ? new Date(t.timestamp.toDate()) : new Date();
                    const dd = String(ts.getDate()).padStart(2, '0');
                    const MM = String(ts.getMonth() + 1).padStart(2, '0');
                    const yy = String(ts.getFullYear()).slice(-2);
                    const timeStr = ts.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    const dateStr = `${dd}/${MM}/${yy}`;
                    const seq = String(t.receiptSeq || 1).padStart(6, '0');
                    const receiptNo = `POS-${dd}${MM}${yy}-${seq}`;
                    const methodLabel = t.method === 'cash' ? 'Cash' : t.method === 'qris' ? 'QRIS' : 'Transfer';

                    let itemLines = '';
                    t.items.forEach(item => {
                        itemLines += `${item.name} x${item.qty} = Rp${item.subtotal.toLocaleString('id-ID')}\n`;
                        if (item.imei) itemLines += `  IMEI: ${item.imei}\n`;
                    });

                    let cashLines = '';
                    if (t.method === 'cash') {
                        cashLines = `Tunai: Rp${t.cash.toLocaleString('id-ID')}\nKembali: Rp${t.change.toLocaleString('id-ID')}\n`;
                    }

                    const msg = `*${CONFIG.storeName.toUpperCase()}*\n_"${CONFIG.storeJargon}"_\n\n${dateStr} ${timeStr}\nNo: ${receiptNo}\n${'─'.repeat(20)}\nCustomer: ${t.customerName || 'Walk-in'}\nKasir: ${t.kasirName || t.createdBy || 'admin'}\n${'─'.repeat(20)}\n${itemLines}${'─'.repeat(20)}\n*TOTAL: Rp${t.total.toLocaleString('id-ID')}*\nMetode: ${methodLabel}\n${cashLines}${'─'.repeat(20)}\nTerima Kasih 🙏\n\n${CONFIG.storeAddress}\n${CONFIG.storeHours}\nWA: ${CONFIG.storeWA}\nIG: ${CONFIG.storeIG}\n${CONFIG.storeWebsite}`;

                    const url = `https://wa.me/${wa}?text=${encodeURIComponent(msg)}`;
                    window.open(url, '_blank');
                }
                }
            }).catch(e => {
                console.error('PDF generation failed, sending text fallback', e);
                // Fallback: kirim teks biasa kalo PDF gagal
                const url = `https://wa.me/${wa}?text=${encodeURIComponent('Struk: ' + window._lastReceiptNo)}`;
                window.open(url, '_blank');
            });
        }

        async function loadTodayStats() {
            if (!currentUser) return;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            try {
                const snapshot = await db.collection('demo-transactions')
                    .where('timestamp', '>=', today)
                    .where('timestamp', '<', tomorrow)
                    .get();

                todayStats = { transactions: 0, revenue: 0 };
                snapshot.forEach(doc => {
                    todayStats.transactions++;
                    todayStats.revenue += doc.data().total || 0;
                });

                document.getElementById('today-transactions').textContent = todayStats.transactions;
                document.getElementById('today-revenue').textContent = `Rp ${todayStats.revenue.toLocaleString('id-ID')}`;
            } catch (err) {
                console.error('Error loading today stats:', err);
            }
        }

        function updateStats() {
            document.getElementById('total-products').textContent = products.length;
            
            const lowStock = products.filter(p => p.stock < 5);
            document.getElementById('low-stock').textContent = lowStock.length;
            
            // Low stock item list
            const listEl = document.getElementById('low-stock-list');
            listEl.innerHTML = '';
            if (lowStock.length === 0) {
                const div = document.createElement('div');
                div.className = 'text-emerald-400 text-xs text-center';
                div.textContent = '✓ Semua stok aman';
                listEl.appendChild(div);
            } else {
                lowStock.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center';
                    div.innerHTML = `
                        <span>${p.name}</span>
                        <span class="px-1.5 py-0.5 bg-emerald-500/20 text-emerald-400 rounded">${p.stock}</span>
                    `;
                    listEl.appendChild(div);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-product').focus();
        });
    </script>
