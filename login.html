<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E61E25">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="icons/favicon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="POS Sulthan">
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
    <title>Login - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="config.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <div id="store-icon" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4">
                <i class="fa-solid fa-store text-white text-3xl"></i>
            </div>
            <h1 id="store-title" class="text-3xl font-bold">POS</h1>
            <p class="text-zinc-400 mt-1">Point of Sale System</p>
        </div>

        <div class="bg-zinc-900 rounded-3xl border border-zinc-800 p-8">
            <h2 class="text-xl font-semibold mb-6 text-center">Login Admin</h2>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="text-sm text-zinc-400">Email</label>
                    <input type="email" id="email" required 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1 focus:outline-none" 
                           style="outline-color: var(--theme-color);">
                </div>
                <div>
                    <label class="text-sm text-zinc-400">Password</label>
                    <input type="password" id="password" required 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1 focus:outline-none"
                           style="outline-color: var(--theme-color);">
                </div>
                
                <button type="submit" id="login-btn"
                        class="w-full py-3.5 rounded-2xl font-semibold transition-colors text-white">
                    Login
                </button>
            </form>
            
            <div id="error-message" class="hidden mt-4 text-center text-red-400 text-sm"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // Apply theme
        const theme = THEMES[CONFIG.theme] || THEMES.emerald;
        document.documentElement.style.setProperty('--theme-color', theme.hex);
        document.getElementById('store-icon').style.backgroundColor = theme.hex;
        document.getElementById('store-title').textContent = CONFIG.storeName;
        document.getElementById('login-btn').style.backgroundColor = theme.hex;

        // Firebase init from config
        firebase.initializeApp(CONFIG.firebase);
        const auth = firebase.auth();

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = './';
            } catch (error) {
                if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    errorMessage.textContent = 'Email atau password salah';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage.textContent = 'Gagal koneksi ke server. Cek internet.';
                } else {
                    errorMessage.textContent = 'Error: ' + error.code;
                }
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
